<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>战国·诸子百家</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei",sans-serif;background:#0d1a0d;color:#f5e6c8;height:100vh;overflow:hidden}
.ld{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#1a3a1a,#0d2a1a);display:flex;align-items:center;justify-content:center;z-index:99}
.ld div{text-align:center}
.ld .l1{font-size:72px;animation:p 2s infinite}
.ld .l2{font-size:32px;color:#ffd700;margin:16px 0}
.ld .l3{width:220px;height:6px;background:rgba(255,255,255,.15);border-radius:3px;margin:0 auto}
.ld .l3 div{height:100%;background:linear-gradient(90deg,#c9a227,#ffd700);border-radius:3px;animation:f 2s forwards}
@keyframes f{to{width:100%}}
@keyframes p{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.g{height:100vh;display:none;flex-direction:column}
.g.s{display:flex}
.tb{display:flex;justify-content:space-between;padding:10px 16px;background:rgba(0,0,0,.5);border-bottom:1px solid rgba(201,162,39,.3)}
.r{display:flex;align-items:center;gap:6px;background:rgba(30,20,15,.8);padding:6px 14px;border-radius:20px;font-size:16px}
.r img{width:24px;height:24px;border-radius:50%;object-fit:cover}
.r span{color:#ffd700;font-weight:bold}
.ch{font-size:13px;color:#b8a88a;background:rgba(201,162,39,.2);padding:6px 14px;border-radius:20px}
.m{flex:1;display:flex;flex-direction:column;padding:10px;gap:10px;overflow:hidden}
.pn{background:rgba(30,20,15,.85);border-radius:14px;padding:14px;border:1px solid rgba(201,162,39,.25)}
.pt{font-size:16px;color:#c9a227;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.hl{overflow-y:auto;max-height:180px;display:flex;flex-direction:column;gap:6px}
.hc{display:flex;align-items:center;gap:10px;padding:10px;background:rgba(255,255,255,.05);border-radius:10px;border-left:3px solid #c9a227;cursor:pointer}
.hc:hover{background:rgba(255,255,255,.1)}
.hc .av{width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid #c9a227;flex-shrink:0}
.hc .nf{flex:1}
.hc .nm{font-size:15px;font-weight:bold}
.hc .mt{font-size:11px;color:#b8a88a}
.hc .st{font-size:12px;margin-top:3px}
.hb{height:5px;background:rgba(0,0,0,.3);border-radius:3px;margin-top:4px}
.hf{height:100%;background:linear-gradient(90deg,#e74c3c,#ff6b6b);border-radius:3px;transition:width .3s}
.eb{text-align:center;padding:16px;background:rgba(0,0,0,.5);border-radius:12px}
.eb .en{font-size:20px;color:#e74c3c;font-weight:bold}
.eb .ee{display:inline-block;padding:3px 12px;border-radius:10px;font-size:13px;margin:6px 0}
.ee-金{background:#c0c0c0;color:#333}.ee-木{background:#228b22}.ee-水{background:#4169e1}.ee-火{background:#ff4500}.ee-土{background:#8b4513}
.ehp{height:16px;background:rgba(0,0,0,.5);border-radius:8px;overflow:hidden;margin:8px 0}
.ehpf{height:100%;background:linear-gradient(90deg,#e74c3c,#ff6b6b);transition:width .3s}
.eb .es{font-size:13px;color:#b8a88a}
.eb .er{font-size:13px;color:#ffd700;margin-top:8px}
.bt{display:flex;gap:8px}
.b{flex:1;padding:14px 8px;border:2px solid rgba(201,162,39,.4);border-radius:12px;color:#f5e6c8;font-size:14px;cursor:pointer;text-align:center}
.b:active{transform:scale(.95)}
.b1{background:linear-gradient(135deg,#c9a227,#b8860b);border-color:#ffd700;font-weight:bold}
.b2{background:linear-gradient(135deg,#8b4513,#654321)}
.b .bi{font-size:24px;display:block;margin-bottom:4px}
.el{display:flex;justify-content:center;gap:6px;padding:8px;background:rgba(0,0,0,.3);border-radius:10px;font-size:12px;color:#b8a88a;flex-wrap:wrap}
.lg{height:100px;padding:0 10px}
.lb{height:100%;background:rgba(0,0,0,.4);border-radius:10px;padding:10px;overflow-y:auto;font-size:12px;line-height:1.8}
.lb div{padding:2px 0;border-bottom:1px solid rgba(255,255,255,.08)}
.tt{position:fixed;top:18%;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);color:#ffd700;padding:10px 22px;border-radius:20px;font-size:14px;z-index:999;pointer-events:none;transition:opacity .3s}
.mb{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.75);z-index:100;align-items:center;justify-content:center}
.mb.s{display:flex}
.md{background:linear-gradient(135deg,#2a1f1a,#1a1510);border-radius:16px;border:2px solid rgba(201,162,39,.4);width:90%;max-width:360px;padding:20px}
.md h3{color:#ffd700;margin-bottom:14px}
.md .rw{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.1);font-size:14px}
.md .rimg{width:80px;height:80px;border-radius:12px;border:2px solid #c9a227;margin:0 auto 14px;display:block;object-fit:cover}
.md .cl{margin-top:14px;width:100%;padding:10px;background:#8b4513;border:none;border-radius:8px;color:white;font-size:14px;cursor:pointer}
.md .ub{margin-top:8px;width:100%;padding:12px;background:linear-gradient(135deg,#c9a227,#b8860b);border:none;border-radius:8px;color:white;font-size:15px;font-weight:bold;cursor:pointer}
</style>
</head>
<body>
<div class="ld" id="ld"><div><div class="l1">⚔️</div><div class="l2">战国·诸子百家</div><div class="l3"><div></div></div></div></div>
<div class="g" id="game">
<div class="tb">
<div class="r"><img src="assets/images/icons/icon_gold.jpg"> <span id="gold">1000</span></div>
<div class="r"><img src="assets/images/icons/icon_prestige.jpg"> <span id="pres">0</span></div>
<div class="ch" id="chap">长平之战前夕</div>
</div>
<div class="m">
<div class="pn" style="max-height:45%">
<div class="pt"><span>📜 门客策士</span><button class="b" style="flex:none;padding:6px 12px;font-size:12px" id="recBtn">🎋 招募 200金</button></div>
<div class="hl" id="heroList"></div>
</div>
<div class="pn" style="flex:1">
<div class="eb" id="enemyBox"></div>
<div class="bt" style="margin-top:10px">
<div class="b b1" id="atkBtn"><span class="bi">⚔️</span>论剑挑战</div>
<div class="b b2" id="autoBtn"><span class="bi">⏳</span>自动挂机</div>
<div class="b b2" id="farmBtn"><span class="bi">🌾</span>游历+50金</div>
</div>
<div class="el">金→木→土→水→火→金 | 克制+60% 被克-30%</div>
</div>
</div>
<div class="lg"><div class="lb" id="logBox"><div>⚡ 欢迎游历战国！</div></div></div>
</div>
<div class="mb" id="modalBg">
<div class="md">
<img class="rimg" id="mImg" src="">
<h3 id="mName">-</h3>
<div class="rw"><span>职业</span><span id="mClass">-</span></div>
<div class="rw"><span>五行</span><span id="mElem">-</span></div>
<div class="rw"><span>等级</span><span id="mLvl">-</span></div>
<div class="rw"><span>攻击</span><span id="mAtk">-</span></div>
<div class="rw"><span>生命</span><span id="mHp">-</span></div>
<button class="ub" id="upBtn">升级 (<span id="mCost">-</span>)</button>
<button class="cl" id="closeModal">关闭</button>
</div>
</div>
<div class="tt" id="toast" style="opacity:0"></div>
<script>
var G={
gold:1000,pres:0,heroes:[],enemy:null,autoId:null,selHero:null,
PROFS:{"儒":{e:"土",img:"character_scholar.jpg"},"法":{e:"金",img:"character_legalist.jpg"},"墨":{e:"木",img:"character_mohist.jpg"},"道":{e:"水",img:"character_taoist.jpg"},"兵":{e:"火",img:"character_military.jpg"},"阴阳":{e:"土",img:"character_yinyang.jpg"},"纵横":{e:"水",img:"character_diplomat.jpg"}},
ADV:{"金":"木","木":"土","土":"水","水":"火","火":"金"},
DATA:[
{n:"白起",p:"兵",a:28,h:180},{n:"孙膑",p:"兵",a:26,h:160},{n:"孔子",p:"儒",a:20,h:150},
{n:"孟子",p:"儒",a:22,h:155},{n:"墨子",p:"墨",a:24,h:170},{n:"商鞅",p:"法",a:25,h:145},
{n:"韩非",p:"法",a:23,h:140},{n:"老子",p:"道",a:26,h:165},{n:"庄子",p:"道",a:24,h:158},
{n:"鬼谷子",p:"纵横",a:27,h:162},{n:"苏秦",p:"纵横",a:25,h:150},{n:"张仪",p:"纵横",a:26,h:148},
{n:"邹衍",p:"阴阳",a:24,h:152},{n:"扁鹊",p:"阴阳",a:20,h:145},{n:"廉颇",p:"兵",a:29,h:195},{n:"李牧",p:"兵",a:28,h:185}
],
ENEMIES:["赵军弓骑","魏武卒","秦锐士","山戎劫匪","韩国劲弩","义渠骑兵","吴起","庞涓","赵括","王翦","乐毅","田单"],
init:function(){
this.load();
if(!this.heroes.length){
var s=this;
["孔子","孙膑","墨子"].forEach(function(n){
var d=s.DATA.find(function(x){return x.n===n});
if(d)s.heroes.push(s.mk(d));
});
this.gold=680;
}
this.mkEnemy();this.render();
setTimeout(function(){
document.getElementById("ld").style.display="none";
document.getElementById("game").classList.add("s");
},1500);
},
mk:function(d){
var p=this.PROFS[d.p];
return{id:Date.now()+Math.random(),name:d.n,prof:d.p,elem:p.e,lv:1,ba:d.a,bh:d.h,atk:d.a,hp:d.h,mhp:d.h,img:p.img};
},
mkEnemy:function(){
var els=["金","木","水","火","土"];
var hp=120+Math.floor(this.pres/8)+this.heroes.length*12;
this.enemy={name:this.ENEMIES[Math.floor(Math.random()*this.ENEMIES.length)],elem:els[Math.floor(Math.random()*5)],mhp:hp,hp:hp,atk:18+Math.floor(this.pres/12),pr:8+Math.floor(Math.random()*16),gr:60+Math.floor(Math.random()*90)};
},
mul:function(a,d){if(this.ADV[a]===d)return 1.6;if(this.ADV[d]===a)return 0.7;return 1},
fight:function(){
if(!this.enemy||this.heroes.length===0)return;
var h=this.heroes[Math.floor(Math.random()*this.heroes.length)];
var m=this.mul(h.elem,this.enemy.elem);
var dmg=Math.max(5,Math.floor(h.atk*m));
this.enemy.hp-=dmg;
var tag=m>1.2?"【克制】":m<0.8?"【受制】":"";
this.log(h.name+"("+h.elem+") 造成 "+dmg+" 伤害 "+tag);
if(this.enemy.hp>0){
var t=this.heroes[Math.floor(Math.random()*this.heroes.length)];
var cd=Math.max(5,Math.floor(this.enemy.atk*(0.8+Math.random()*0.5)));
t.hp-=cd;
this.log(this.enemy.name+" 反击 "+t.name+" -"+cd);
var s=this;
this.heroes=this.heroes.filter(function(x){if(x.hp<=0){s.log(x.name+" 殉国");return false}return true});
}else{
this.gold+=this.enemy.gr;this.pres+=this.enemy.pr;
this.log("🏆 击败"+this.enemy.name+"！声望+"+this.enemy.pr+" 金+"+this.enemy.gr);
this.mkEnemy();
}
this.save();this.render();
},
recruit:function(){
if(this.gold<200){this.toast("黄金不足");return}
var s=this;
var avail=this.DATA.filter(function(d){return!s.heroes.some(function(h){return h.name===d.n})});
if(!avail.length){this.toast("天下英雄已尽入彀中");return}
var d=avail[Math.floor(Math.random()*avail.length)];
var h=this.mk(d);
this.heroes.push(h);this.gold-=200;
this.save();this.render();
this.toast(h.name+"（"+h.prof+"·"+h.elem+"）加入！");
},
upgrade:function(){
if(!this.selHero)return;
var h=this.selHero,cost=h.lv*80;
if(this.gold<cost){this.toast("需要"+cost+"金");return}
this.gold-=cost;h.lv++;
h.atk=h.ba+(h.lv-1)*3;
h.mhp=h.bh+(h.lv-1)*18;
h.hp=Math.min(h.hp+25,h.mhp);
this.save();this.render();
this.toast(h.name+" 升至 Lv."+h.lv);
this.showModal(h);
},
travel:function(){this.gold+=50;this.save();this.render();this.toast("游历修行 +50金")},
toggleAuto:function(){
var s=this;
if(this.autoId){clearInterval(this.autoId);this.autoId=null;this.toast("自动关闭");return}
this.autoId=setInterval(function(){if(s.heroes.length)s.fight()},1800);
this.toast("自动开启");
},
render:function(){
document.getElementById("gold").textContent=this.gold;
document.getElementById("pres").textContent=this.pres;
var ch=this.pres>=1500?"千古一帝":this.pres>=600?"百家争鸣":this.pres>=200?"合纵连横":"长平之战前夕";
document.getElementById("chap").textContent=ch;
var s=this;
document.getElementById("heroList").innerHTML=this.heroes.map(function(h){
var pct=Math.round(h.hp/h.mhp*100);
return'<div class="hc" data-id="'+h.id+'"><img class="av" src="assets/images/characters/'+h.img+'" onerror="this.style.display=\'none\'"><div class="nf"><div class="nm">'+h.name+'</div><div class="mt">'+h.prof+'·'+h.elem+' | Lv.'+h.lv+'</div><div class="st">⚔️'+h.atk+' ❤️'+h.hp+'/'+h.mhp+'</div><div class="hb"><div class="hf" style="width:'+pct+'%"></div></div></div></div>';
}).join("");
document.querySelectorAll(".hc").forEach(function(c){
c.onclick=function(){
var hero=s.heroes.find(function(h){return h.id===parseFloat(c.dataset.id)});
if(hero)s.showModal(hero);
};
});
if(this.enemy){
var e=this.enemy,pct=Math.round(e.hp/e.mhp*100);
document.getElementById("enemyBox").innerHTML='<div class="en">🏹 '+e.name+'</div><div class="ee ee-'+e.elem+'">【'+e.elem+'】</div><div class="ehp"><div class="ehpf" style="width:'+pct+'%"></div></div><div class="es">❤️ '+e.hp+'/'+e.mhp+' | ⚔️ '+e.atk+'</div><div class="er">✨ 声望+'+e.pr+' 金+'+e.gr+'</div>';
}
},
showModal:function(h){
this.selHero=h;
document.getElementById("mImg").src="assets/images/characters/"+h.img;
document.getElementById("mName").textContent=h.name;
document.getElementById("mClass").textContent=h.prof;
document.getElementById("mElem").textContent=h.elem;
document.getElementById("mLvl").textContent="Lv."+h.lv;
document.getElementById("mAtk").textContent=h.atk;
document.getElementById("mHp").textContent=h.hp+"/"+h.mhp;
document.getElementById("mCost").textContent=h.lv*80+"金";
document.getElementById("modalBg").classList.add("s");
},
log:function(msg){
var box=document.getElementById("logBox");
var d=document.createElement("div");
var t=new Date();
var ts=String(t.getHours()).padStart(2,"0")+":"+String(t.getMinutes()).padStart(2,"0")+":"+String(t.getSeconds()).padStart(2,"0");
d.textContent="["+ts+"] "+msg;
box.appendChild(d);box.scrollTop=box.scrollHeight;
while(box.children.length>50)box.removeChild(box.firstChild);
},
toast:function(msg){
var t=document.getElementById("toast");
t.textContent=msg;t.style.opacity="1";
setTimeout(function(){t.style.opacity="0"},2000);
},
save:function(){try{localStorage.setItem("wsg3",JSON.stringify({g:this.gold,p:this.pres,h:this.heroes}))}catch(e){}},
load:function(){try{var d=JSON.parse(localStorage.getItem("wsg3"));if(d){this.gold=d.g||1000;this.pres=d.p||0;this.heroes=d.h||[]}}catch(e){}}
};
document.addEventListener("DOMContentLoaded",function(){
G.init();
document.getElementById("atkBtn").onclick=function(){G.fight()};
document.getElementById("recBtn").onclick=function(){G.recruit()};
document.getElementById("autoBtn").onclick=function(){G.toggleAuto()};
document.getElementById("farmBtn").onclick=function(){G.travel()};
document.getElementById("upBtn").onclick=function(){G.upgrade()};
document.getElementById("closeModal").onclick=function(){document.getElementById("modalBg").classList.remove("s")};
document.getElementById("modalBg").onclick=function(e){if(e.target.id==="modalBg")document.getElementById("modalBg").classList.remove("s")};
});
</script>
</body>
</html>
